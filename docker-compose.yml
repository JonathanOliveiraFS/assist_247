services:
  # -------------------------------------------------------------
  # 1. INFRAESTRUTURA BASE (Banco de Dados e Cache)
  # -------------------------------------------------------------
  postgres:
    container_name: postgres_integra
    image: postgres:15.6-alpine
    command: ["postgres", "-c", "max_connections=1000"]
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    container_name: redis_integra
    image: redis:7.2.4-alpine
    command: redis-server --port 6379 --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------
  # 2. MOTOR DE TEMPO REAL (Comunicação WhatsApp)
  # -------------------------------------------------------------
  evolution-api:
    container_name: evolution_api_integra
    image: atendai/evolution-api:v2.2.0
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # -------------------------------------------------------------
  # 3. MOTOR PRINCIPAL (Bot FastAPI + LangChain)
  # -------------------------------------------------------------
  bot:
    container_name: integra_ai_bot
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./rag_data:/app/rag_data
      - ./app:/app/app
      - ./mcp_servers:/app/mcp_servers

  # -------------------------------------------------------------
  # 4. SERVIDORES MCP (Isolamento de Ferramentas)
  # -------------------------------------------------------------
  mcp-agenda:
    container_name: mcp_agenda_clinica
    build: ./mcp_servers/mcp_agenda_clinica
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - .env
    command: python server.py

  mcp-crm:
    container_name: mcp_crm_integra
    build: ./mcp_servers/mcp_crm_integra
    restart: always
    ports:
      - "8002:8000"
    env_file:
      - .env
    command: python server.py

  # -------------------------------------------------------------
  # 5. INFRA E ORQUESTRADOR KESTRA (v1.3 LTS - 2026)
  # -------------------------------------------------------------
  postgres_kestra:
    container_name: postgres_kestra
    image: postgres:15.6-alpine
    restart: always
    environment:
      - POSTGRES_USER=kestra_admin
      - POSTGRES_PASSWORD=kestra_senha_segura
      - POSTGRES_DB=kestra_db
    volumes:
      - postgres_kestra_data:/var/lib/postgresql/data

  kestra:
    image: kestra/kestra:v1.3.8-full
    container_name: kestra_integra
    user: "root"
    command: server standalone
    restart: always
    ports:
      - "8081:8080"
    env_file:
      - .env
    volumes:
      - kestra_storage:/app/storage
      - ./kestra/flows:/app/flows
      - ./rag_data:/app/rag_data
      - ./scripts:/app/scripts
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
        datasources:
          postgres:
            url: jdbc:postgresql://postgres_kestra:5432/kestra_db
            driverClassName: org.postgresql.Driver
            username: kestra_admin
            password: kestra_senha_segura
        micronaut:
          security:
            enabled: false
          flyway:
            datasources:
              postgres:
                enabled: true
      JAVA_OPTS: "-Xmx1g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - postgres_kestra

# -------------------------------------------------------------
# DEFINIÇÃO DE VOLUMES GLOBAIS (Mapping fix)
# -------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  kestra_storage:
  postgres_kestra_data: