services:
  # -------------------------------------------------------------
  # 1. INFRAESTRUTURA BASE (Banco de Dados e Cache)
  # -------------------------------------------------------------
  postgres:
    container_name: postgres_integra
    image: postgres:15
    command: ["postgres", "-c", "max_connections=1000"]
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: redis_integra
    image: redis:latest
    command: redis-server --port 6379 --appendonly yes
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # -------------------------------------------------------------
  # 2. MOTOR DE TEMPO REAL (Comunicação WhatsApp)
  # -------------------------------------------------------------
  evolution-api:
    container_name: evolution_api_integra
    image: evoapicloud/evolution-api:latest 
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis

  # -------------------------------------------------------------
  # 3. MOTOR PRINCIPAL (Bot FastAPI + LangChain)
  # -------------------------------------------------------------
  bot:
    container_name: integra_ai_bot
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - evolution-api
      - redis
    volumes:
      - ./rag_data:/app/rag_data
      - ./app:/app/app 
      - ./mcp_servers:/app/mcp_servers

  # -------------------------------------------------------------
  # 4. SERVIDORES MCP (Isolamento de Ferramentas)
  # -------------------------------------------------------------
  mcp-agenda:
    container_name: mcp_agenda_clinica
    build: ./mcp_servers/mcp_agenda_clinica
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - .env
    command: python server.py

  mcp-crm:
    container_name: mcp_crm_integra
    build: ./mcp_servers/mcp_crm_integra
    restart: always
    ports:
      - "8002:8000"
    env_file:
      - .env
    command: python server.py

  # -------------------------------------------------------------
  # 5. INFRA E ORQUESTRADOR KESTRA (v1.3 LTS - 2026)
  # -------------------------------------------------------------
  postgres_kestra:
    container_name: postgres_kestra
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=kestra_admin
      - POSTGRES_PASSWORD=kestra_senha_segura
      - POSTGRES_DB=kestra_db
    volumes:
      - postgres_kestra_data:/var/lib/postgresql/data

  kestra:
    image: kestra/kestra:latest-lts
    container_name: kestra_integra
    user: "root"
    command: server standalone
    restart: always
    ports:
      - "8081:8080"
    env_file:
      - .env
    volumes:
      - kestra_storage:/app/storage
      - ./kestra/flows:/app/flows
      - ./rag_data:/app/rag_data
      - ./scripts:/app/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
        datasources:
          postgres:
            url: jdbc:postgresql://postgres_kestra:5432/kestra_db
            driverClassName: org.postgresql.Driver
            username: kestra_admin
            password: kestra_senha_segura
        micronaut:
          flyway:
            datasources:
              postgres:
                enabled: true
      JAVA_OPTS: "-Xmx1g"
    depends_on:
      - postgres_kestra

# -------------------------------------------------------------
# DEFINIÇÃO DE VOLUMES GLOBAIS (Mapping fix)
# -------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  kestra_storage:
  postgres_kestra_data: